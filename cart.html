<!DOCTYPE html>

<html>

<head>

<title>Your Cart - Kshopify</title>

<link rel="stylesheet" href="css/styles1.css">

<style>

body{
font-family:Arial;
background:#f3f3f3;
}

h1{
text-align:center;
margin-top:40px;
}

.cart-container{
max-width:1000px;
margin:auto;
padding:20px;
}

.cart-item{
display:flex;
align-items:center;
gap:20px;
background:white;
padding:15px;
margin-bottom:20px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

.cart-item img{
width:120px;
height:120px;
object-fit:contain;
}

.item-details{
flex:1;
}

.qty-btn{
padding:4px 10px;
margin:4px;
cursor:pointer;
}

.remove-btn{
background:red;
color:white;
border:none;
padding:8px 12px;
cursor:pointer;
border-radius:5px;
}

.total-box{
background:white;
padding:20px;
margin-top:20px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
text-align:center;
}

.checkout{
background:#ff9900;
border:none;
padding:12px;
width:100%;
margin-top:10px;
cursor:pointer;
font-weight:bold;
border-radius:6px;
}

</style>

</head>

<body>

<h1>Your Cart</h1>

<div class="cart-container">

<div id="cartItems"></div>

<div class="total-box">

<h2>Total: ₹<span id="totalPrice">0</span></h2>

<button class="checkout" onclick="checkout()">
Proceed to Checkout
</button>

</div>

</div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

let container = document.getElementById("cartItems");

let total = 0;


function loadCart(){

container.innerHTML="";
total = 0;

if(cart.length === 0){

container.innerHTML="<h2>Your cart is empty</h2>";

document.getElementById("totalPrice").innerText = 0;

return;

}

cart.forEach((item,index)=>{

let itemTotal = item.price * item.quantity;

total += itemTotal;

container.innerHTML += `

<div class="cart-item">

<img src="images/${item.image}">

<div class="item-details">

<h3>${item.name}</h3>

<p>Price: ₹${item.price}</p>

<p>

<button class="qty-btn" onclick="decreaseQty(${index})">-</button>

${item.quantity}

<button class="qty-btn" onclick="increaseQty(${index})">+</button>

</p>

</div>

<button class="remove-btn" onclick="removeItem(${index})">
Remove
</button>

</div>

`;

});

document.getElementById("totalPrice").innerText = total;

}


function increaseQty(index){

cart[index].quantity += 1;

localStorage.setItem("cart", JSON.stringify(cart));

loadCart();

}


function decreaseQty(index){

cart[index].quantity -= 1;

if(cart[index].quantity <= 0){

cart.splice(index,1);

}

localStorage.setItem("cart", JSON.stringify(cart));

loadCart();

}


function removeItem(index){

cart.splice(index,1);

localStorage.setItem("cart", JSON.stringify(cart));

loadCart();

}


function checkout(){

let cart = JSON.parse(localStorage.getItem("cart")) || [];

if(cart.length === 0){

alert("No items in cart");

return;

}

window.location.href="checkout.html";

}

loadCart();

</script>

</body>

</html>
